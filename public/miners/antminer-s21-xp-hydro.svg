  <!-- Chip body -->
  <rect x="136" y="60" width="128" height="140" rx="8" fill="#1a1a1a" stroke="#60a5fa" stroke-width="1.8"/>
  <!-- Chip inner area -->
  <rect x="144" y="68" width="112" height="124" rx="4" fill="#0e0e0e" stroke="#60a5fa2a" stroke-width="0.8"/>
  <!-- Grid -->
  <line x1="140" y1="90" x2="260" y2="90" stroke="#60a5fa18" stroke-width="0.8"/><line x1="140" y1="116" x2="260" y2="116" stroke="#60a5fa18" stroke-width="0.8"/><line x1="140" y1="142" x2="260" y2="142" stroke="#60a5fa18" stroke-width="0.8"/><line x1="170" y1="62" x2="170" y2="198" stroke="#60a5fa18" stroke-width="0.8"/><line x1="196" y1="62" x2="196" y2="198" stroke="#60a5fa18" stroke-width="0.8"/><line x1="222" y1="62" x2="222" y2="198" stroke="#60a5fa18" stroke-width="0.8"/>

  <!-- LED dots corner -->
  <circle cx="154" cy="78" r="3.5" fill="#60a5fa" opacity="0.9"/>
  <circle cx="165" cy="78" r="3.5" fill="#00c853" opacity="0.7"/>
  <circle cx="176" cy="78" r="3.5" fill="#1a1a1a" opacity="0.4"/>

  <!-- ASIC label -->
  <text x="200" y="122" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#60a5fa" letter-spacing="2">ASIC</text>
  <text x="200" y="140" text-anchor="middle" font-family="monospace" font-size="8" fill="#60a5fa66" letter-spacing="1">SHA-256</text>

  
    <rect x="152" y="152" width="96" height="20" rx="4" fill="#60a5fa22" stroke="#60a5fa66" stroke-width="0.8"/>
    <text x="200" y="166" text-anchor="middle" font-family="monospace" font-size="9" fill="#60a5fa" letter-spacing="1">HYDRO</text>
  

  <!-- Divider -->
  <line x1="30" y1="215" x2="370" y2="215" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Model label -->
  <text x="200" y="236" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="0.5">S21 XP Hydro</text>

  <!-- Stats row -->
  
    <text x="110" y="250" text-anchor="middle" font-family="monospace" font-size="11" fill="#60a5fa" font-weight="600">473 TH/s</text>
    <text x="200" y="250" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">·</text>
    <text x="290" y="250" text-anchor="middle" font-family="monospace" font-size="11" fill="#60a5fa" font-weight="600">12.0 J/TH</text>
  

  <!-- Manufacturer -->
  <text x="200" y="276" text-anchor="middle" font-family="monospace" font-size="8" fill="#3a3a3a" letter-spacing="2">BITMAIN</text>
</svg>